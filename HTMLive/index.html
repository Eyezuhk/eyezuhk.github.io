<!DOCTYPE html> <html lang="pt-BR"> <head> <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"> <meta charset="utf-8"> <meta name="viewport" content="width=device-width, initial-scale=1"> <title>HTMLive</title> <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"> <style>body{display:flex;flex-direction:column;height:100vh}.controls{margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #ccc}.theme-switch{margin-left:10px}.dark-mode{background-color:#333;color:#fff}.dark-mode #editor{background-color:#444;color:#fff}.dark-mode #livePreview{background-color:#444;color:#fff}.editor-preview{display:flex;flex-direction:row;height:calc(100vh - 60px)}#editor{width:50%;padding:10px;border-right:1px solid #ccc;overflow-y:auto}#livePreview{width:50%;padding:10px;overflow-y:auto}iframe{width:100%;height:100%;border:0}</style> </head> <body> <div class="controls"> <button class="btn btn-primary" onclick="previewFullPage()">Preview Full Page</button> <button class="btn btn-danger" onclick="clearEditor()">Clear</button> <button class="btn btn-info" onclick="importHTML()">Import</button> <button class="btn btn-success" onclick="exportHTML()">Export</button> <div class="theme-switch"> <label for="theme-switch">Theme:</label> <select id="theme-switch" onchange="changeTheme()"> <option value="light">Light</option> <option value="dark">Dark</option> </select> </div> </div> <div class="editor-preview"> <div id="editor" contenteditable="true" placeholder="Coloque seu HTML aqui..."> <p>Exemplo: <strong>Olá, mundo!</strong></p> </div> <div id="livePreview"> <iframe id="liveFrame"></iframe> </div> </div> <script>function previewFullPage(){const e=editor.innerText,t=window.open();t.document.write(e),t.document.close()}function clearEditor(){editor.innerText="",liveFrame.srcdoc=""}function importHTML(){const e=document.createElement("input");e.type="file",e.accept=".html",e.onchange=(e=>{const t=e.target.files[0],n=new FileReader;n.onload=(e=>{editor.innerText=e.target.result,liveFrame.srcdoc=e.target.result}),n.readAsText(t)}),e.click()}function exportHTML(){const e=editor.innerText,t=new Blob([e],{type:"text/html"}),n=URL.createObjectURL(t),o=document.createElement("a");o.href=n,o.download="export.html",document.body.appendChild(o),o.click(),document.body.removeChild(o),URL.revokeObjectURL(n)}function changeTheme(){"dark"===themeSwitch.value?document.body.classList.add("dark-mode"):document.body.classList.remove("dark-mode")}const editor=document.getElementById("editor"),liveFrame=document.getElementById("liveFrame"),themeSwitch=document.getElementById("theme-switch");editor.addEventListener("input",()=>{const e=editor.innerText;liveFrame.srcdoc=e}),liveFrame.srcdoc=editor.innerText;</script> </body> </html>
